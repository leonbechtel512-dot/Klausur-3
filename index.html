<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Klausur-Welt</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- WORKAROUND: Icons als Emojis für das Single-HTML-Format ---
    const Trophy = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>🏆</span>;
    const Star = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>⭐</span>;
    const AlertTriangle = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>⚠️</span>;
    const CheckCircle2 = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>✅</span>;
    const ChevronRight = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>➡️</span>;
    const ArrowLeft = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>⬅️</span>;
    const BookMarked = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>📖</span>;
    const Map = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>🗺️</span>;
    const Castle = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>🏰</span>;
    const Play = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>▶️</span>;
    const Lock = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>🔒</span>;
    const Sparkles = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>✨</span>;
    const Skull = ({className}) => <span className={className} style={{display:'inline-block', fontStyle:'normal'}}>💀</span>;

    // --- HILFSKOMPONENTE FÜR BRÜCHE ---
    const Fraction = ({ num, den }) => (
      <span className="inline-flex flex-col items-center justify-center align-middle mx-1 text-base font-bold">
        <span className="border-b-2 border-current px-1 pb-0.5 w-full text-center leading-none">{num}</span>
        <span className="px-1 pt-0.5 w-full text-center leading-none">{den}</span>
      </span>
    );

    // --- HILFSKOMPONENTEN FÜR EXAKTE MATHEMATISCHE GRAPHEN ---
    const mapX = (x, xD, w) => ((x - xD[0]) / (xD[1] - xD[0])) * w;
    const mapY = (y, yD, h) => h - ((y - yD[0]) / (yD[1] - yD[0])) * h;

    const MathGraph = ({ xD=[-5,5], yD=[-5,5], width=400, height=250, children }) => {
      const originX = mapX(0, xD, width);
      const originY = mapY(0, yD, height);

      return (
        <div className="w-full overflow-hidden bg-white rounded-xl shadow-inner border border-slate-200 p-2">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto font-sans">
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
              </marker>
            </defs>
            {Array.from({length: xD[1]-xD[0]+1}, (_, i) => xD[0]+i).map(x => (
              <line key={`gx-${x}`} x1={mapX(x, xD, width)} y1={0} x2={mapX(x, xD, width)} y2={height} stroke="#f1f5f9" strokeWidth="1" />
            ))}
            {Array.from({length: yD[1]-yD[0]+1}, (_, i) => yD[0]+i).map(y => (
              <line key={`gy-${y}`} x1={0} y1={mapY(y, yD, height)} x2={width} y2={mapY(y, yD, height)} stroke="#f1f5f9" strokeWidth="1" />
            ))}
            <line x1={0} y1={originY} x2={width} y2={originY} stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)" />
            <line x1={originX} y1={height} x2={originX} y2={0} stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)" />
            <text x={width - 15} y={originY - 8} fontSize="12" fill="#64748b" fontWeight="bold">x</text>
            <text x={originX + 8} y={15} fontSize="12" fill="#64748b" fontWeight="bold">y</text>
            {children}
          </svg>
        </div>
      );
    };

    const PlotPath = ({ fn, xD, yD, w=400, h=250, color="#3b82f6", strokeWidth=2.5, dashed=false }) => {
      let d = "";
      const steps = 150;
      for(let i=0; i<=steps; i++) {
        const x = xD[0] + (i/steps) * (xD[1] - xD[0]);
        const y = fn(x);
        const clampedY = Math.max(yD[0]-10, Math.min(yD[1]+10, y)); 
        const px = mapX(x, xD, w);
        const py = mapY(clampedY, yD, h);
        d += (i === 0 ? "M " : "L ") + `${px} ${py} `;
      }
      return <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={dashed ? "6 4" : "none"} />;
    };

    const PlotPoint = ({ x, y, xD, yD, w=400, h=250, color="#ef4444", label, labelOffset={x:0, y:-10} }) => (
      <g>
        <circle cx={mapX(x, xD, w)} cy={mapY(y, yD, h)} r={5} fill={color} stroke="#fff" strokeWidth="1.5" />
        {label && <text x={mapX(x, xD, w) + labelOffset.x} y={mapY(y, yD, h) + labelOffset.y} fontSize="12" fill={color} fontWeight="bold" textAnchor="middle">{label}</text>}
      </g>
    );

    const PlotLine = ({ x1, y1, x2, y2, xD, yD, w=400, h=250, color="#ef4444", strokeWidth=2, dashed=false }) => (
      <line x1={mapX(x1, xD, w)} y1={mapY(y1, yD, h)} x2={mapX(x2, xD, w)} y2={mapY(y2, yD, h)} stroke={color} strokeWidth={strokeWidth} strokeDasharray={dashed ? "5 5" : "none"} />
    );

    const PlotArea = ({ xStart, xEnd, xD, yD, w=400, h=250, color }) => (
      <rect x={mapX(xStart, xD, w)} y={0} width={mapX(xEnd, xD, w) - mapX(xStart, xD, w)} height={h} fill={color} opacity="0.15" />
    );

    // --- DEKORATIONEN WELTKARTE ---
    const Cloud = ({ style, delay, isDark }) => (
      <div className={`absolute opacity-80 pointer-events-none animate-pulse`} style={{ ...style, animationDuration: '4s', animationDelay: delay }}>
        <svg width="100" height="40" viewBox="0 0 100 40" fill={isDark ? "#475569" : "white"}>
          <path d="M 20 40 Q 5 40 5 25 Q 5 10 20 15 Q 30 -5 55 5 Q 75 -5 85 15 Q 100 10 95 25 Q 95 40 80 40 Z" />
        </svg>
      </div>
    );

    const Hill = ({ style, isDark }) => (
      <div className="absolute bottom-0 opacity-100 pointer-events-none" style={style}>
        <svg width="200" height="100" viewBox="0 0 200 100" fill="none">
          <path d="M 0 100 Q 100 -50 200 100 Z" fill={isDark ? "#1e1b4b" : "#22c55e"} />
          <path d="M 0 100 Q 100 -50 200 100 Z" stroke={isDark ? "#312e81" : "#16a34a"} strokeWidth="8" />
        </svg>
      </div>
    );

    // --- DATEN ---
    const topicsData = [
      {
        id: "mittlere-aenderung", world: 1, category: "Welt 1", title: "1-1: Mittlere Änderungsrate", shortDesc: "Differenzenquotient & Sekante", mapPos: { x: 15, y: 88 },
        content: (
          <div className="space-y-4 text-gray-700">
            <p>Die <strong>mittlere Änderungsrate</strong> gibt an, wie stark sich ein Graph in einem bestimmten Abschnitt (Intervall) <em>durchschnittlich</em> ändert. Stell dir vor, du verbindest Start- und Endpunkt dieses Abschnitts mit einer geraden Linie (der sogenannten <strong>Sekante</strong>).</p>
            <p>Die Steigung dieser Sekante berechnen wir mit dem <strong>Differenzenquotient</strong>:</p>
            <div className="bg-sky-50 p-4 rounded-lg border border-sky-200 flex items-center justify-center font-mono text-lg font-bold text-sky-900">
              m = <Fraction num="f(x₂) - f(x₁)" den="x₂ - x₁" />
            </div>
          </div>
        ),
        example: {
          functionText: "f(x) = 0.5x² im Intervall [1; 3]",
          calculation: (
            <ul className="space-y-2 list-disc pl-5">
              <li><strong>Schritt 1 (y-Werte berechnen):</strong> <br/>f(1) = 0.5 · 1² = 0.5 <br/> f(3) = 0.5 · 3² = 4.5</li>
              <li><strong>Schritt 2 (Einsetzen):</strong> <br/><span className="inline-flex items-center align-middle mt-1">m = <Fraction num="4.5 - 0.5" den="3 - 1" /></span></li>
              <li><strong>Ergebnis:</strong> <span className="inline-flex items-center align-middle">m = <Fraction num="4" den="2" /> = <strong>2</strong></span></li>
            </ul>
          ),
          visual: (
            <MathGraph xD={[0, 4]} yD={[-1, 6]}>
              <PlotPath fn={x => 0.5 * x * x} xD={[0, 4]} yD={[-1, 6]} color="#3b82f6" />
              <PlotPath fn={x => 2 * x - 1.5} xD={[0, 4]} yD={[-1, 6]} color="#ef4444" dashed />
              <PlotPoint x={1} y={0.5} xD={[0, 4]} yD={[-1, 6]} color="#ef4444" label="P₁" />
              <PlotPoint x={3} y={4.5} xD={[0, 4]} yD={[-1, 6]} color="#ef4444" label="P₂" />
            </MathGraph>
          )
        },
        mistakes: "Oft werden beim Einsetzen in die Formel x und y vertauscht. Achte genau darauf: Oben im Bruch (Zähler) stehen die y-Werte (die f(x)-Werte), unten im Nenner die x-Werte!",
        quiz: [
          { question: "1. Welche geometrische Linie gehört zur mittleren Änderungsrate?", options: ["Tangente", "Sekante", "Normale"], answer: 1, explanation: "Richtig! Die Sekante schneidet den Graphen in den zwei Punkten des Intervalls." },
          { question: "2. Berechne die mittlere Änderungsrate von f(x) = x² im Intervall [0; 3].", options: ["3", "6", "9"], answer: 0, explanation: "Klasse! f(3)=9, f(0)=0. Eingesetzt: m = (9-0)/(3-0) = 3." }
        ]
      },
      // HINWEIS: Hier habe ich aus Platzgründen einige Topics entfernt, DU KANNST HIER DEIN KOMPLETTES `topicsData` ARRAY WIEDER EINFÜGEN!
      {
        id: "momentane-aenderung", world: 1, category: "Welt 1", title: "1-2: Momentane Änderung", shortDesc: "Ableitung & Tangentensteigung", mapPos: { x: 45, y: 75 },
        content: (
          <div className="space-y-4 text-gray-700">
            <p>Die <strong>momentane Änderungsrate</strong> beschreibt die Steigung des Graphen in einem <em>einzigen, exakten Punkt</em>. </p>
          </div>
        ),
        example: {
          functionText: "f(x) = -x² + 4x an der Stelle x₀ = 1",
          calculation: (
            <ul className="space-y-2 list-disc pl-5">
              <li><strong>Schritt 1 (Ableitung bilden):</strong> <br/>f'(x) = -2x + 4</li>
              <li><strong>Schritt 2 (x₀ einsetzen):</strong> <br/>f'(1) = -2 · 1 + 4 = <strong>2</strong></li>
            </ul>
          ),
          visual: (
            <MathGraph xD={[-1, 4]} yD={[-1, 5]}>
              <PlotPath fn={x => -x*x + 4*x} xD={[-1, 4]} yD={[-1, 5]} color="#3b82f6" />
              <PlotPath fn={x => 2*x + 1} xD={[-1, 4]} yD={[-1, 5]} color="#eab308" strokeWidth={3} />
              <PlotPoint x={1} y={3} xD={[-1, 4]} yD={[-1, 5]} color="#eab308" label="P(1|3)" />
            </MathGraph>
          )
        },
        mistakes: "Viele Schüler denken, f'(x₀) gibt den y-Wert an. Falsch! f(x₀) ist die 'Höhe', f'(x₀) ist die 'Steilheit'.",
        quiz: [
          { question: "1. Was berechnet die erste Ableitung f'(x₀) geometrisch?", options: ["Die Steigung der Sekante", "Die Steigung der Tangente", "Den y-Achsenabschnitt"], answer: 1, explanation: "Perfekt! f'(x) gibt immer die Tangentensteigung im Berührpunkt an." }
        ]
      }
    ];

    function App() {
      const [view, setView] = useState('home'); 
      const [currentTopicId, setCurrentTopicId] = useState(null);
      const [xp, setXp] = useState(0);
      const [completedTopics, setCompletedTopics] = useState([]);
      const [showLevelUp, setShowLevelUp] = useState(false);
      const [errorCount, setErrorCount] = useState(0); 
      const [activeQuizIndex, setActiveQuizIndex] = useState(0);
      const [selectedQuizAnswer, setSelectedQuizAnswer] = useState(null);
      const [quizResult, setQuizResult] = useState(null);
      const [topicScore, setTopicScore] = useState(0);
      const [activeWorld, setActiveWorld] = useState(1);

      const world1Topics = topicsData.filter(t => t.world === 1);
      const isWorld1Complete = world1Topics.every(t => completedTopics.includes(t.id));

      const totalTopics = topicsData.length;
      const completedQuizzesCount = completedTopics.filter(id => !id.includes("_read")).length;
      const progressPercent = Math.round((completedQuizzesCount / totalTopics) * 100);
      
      const currentLevel = Math.floor(xp / 150) + 1;
      const xpForNextLevel = currentLevel * 150;

      useEffect(() => {
        if (xp > 0 && xp % 150 === 0 || (xp > 150 && Math.floor(xp/150) > Math.floor((xp-20)/150))) {
          setShowLevelUp(true);
          setTimeout(() => setShowLevelUp(false), 3000);
        }
      }, [xp]);

      const openTopic = (id) => {
        setCurrentTopicId(id);
        setActiveQuizIndex(0);
        setSelectedQuizAnswer(null);
        setQuizResult(null);
        setTopicScore(0);
        setView('topic');
        window.scrollTo(0, 0);
      };

      const handleQuizAnswer = (topicId, answerIndex, correctAnswerIndex) => {
        setSelectedQuizAnswer(answerIndex);
        if (answerIndex === correctAnswerIndex) {
          setQuizResult('correct');
          setTopicScore(s => s + 20); 
          setXp(x => x + 20); 
        } else {
          setQuizResult('wrong');
          setErrorCount(e => e + 1);
        }
      };

      const nextQuestion = () => {
        if (activeQuizIndex < topicsData.find(t=>t.id===currentTopicId).quiz.length - 1) {
          setActiveQuizIndex(a => a + 1);
          setSelectedQuizAnswer(null);
          setQuizResult(null);
        } else {
          if (!completedTopics.includes(currentTopicId)) {
            setCompletedTopics([...completedTopics, currentTopicId]);
          }
          setView('home');
          window.scrollTo(0, 0);
        }
      };

      useEffect(() => {
        if (view === 'topic' && currentTopicId) {
           if (!completedTopics.includes(currentTopicId + "_read")) {
              setCompletedTopics([...completedTopics, currentTopicId + "_read"]);
              setXp(xp => xp + 50); 
           }
        }
      }, [view, currentTopicId]);

      const currentTopic = topicsData.find(t => t.id === currentTopicId);
      const currentWorldTopicsData = topicsData.filter(t => t.world === activeWorld);

      const generatePathD = () => {
        let d = "";
        currentWorldTopicsData.forEach((t, i) => {
          if(i === 0) d += `M ${t.mapPos.x} ${t.mapPos.y} `;
          else d += `L ${t.mapPos.x} ${t.mapPos.y} `;
        });
        return d;
      };

      const nextAvailableLevelId = topicsData.find(t => !completedTopics.includes(t.id))?.id;

      const isLevelLocked = (topicIndexInGlobalArray) => {
        if (topicIndexInGlobalArray === 0) return false; 
        const previousTopicId = topicsData[topicIndexInGlobalArray - 1].id;
        return !completedTopics.includes(previousTopicId);
      };

      const isWorld2Dark = activeWorld === 2;

      return (
        <div className="min-h-screen font-sans text-slate-800 bg-slate-900 pb-10">
          <header className="bg-white sticky top-0 z-50 border-b-4 border-slate-300 shadow-md">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => setView('home')}>
                <div className="bg-red-600 p-2.5 rounded-xl border-b-4 border-red-800 shadow-sm flex items-center justify-center">
                  <span className="font-black text-white text-xl leading-none px-1">M</span>
                </div>
                <div><h1 className="font-black text-2xl leading-tight text-slate-800">Klausur-Welt</h1></div>
              </div>
              <div className="flex items-center space-x-4">
                <div className="text-right hidden sm:block">
                  <div className="text-sm font-black text-slate-800 uppercase tracking-wide">Level {currentLevel}</div>
                  <div className="text-xs font-bold text-slate-500">{xp} / {xpForNextLevel} XP</div>
                </div>
                <div className="w-24 sm:w-32 h-5 bg-slate-800 rounded-full overflow-hidden border-2 border-slate-900 relative">
                  <div className="h-full bg-gradient-to-r from-yellow-400 to-yellow-200" style={{ width: `${(xp % 150) / 150 * 100}%` }} />
                </div>
              </div>
            </div>
          </header>

          {showLevelUp && (
            <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-50 bg-yellow-400 text-slate-900 px-8 py-4 rounded-xl shadow-2xl border-4 border-white flex items-center">
              <Star className="text-2xl mr-2" />
              <span className="font-black text-2xl tracking-wider uppercase">Level Up! Lvl {currentLevel}</span>
            </div>
          )}

          <main className="w-full max-w-md md:max-w-3xl mx-auto mt-4 rounded-3xl overflow-hidden shadow-2xl border-4 border-slate-800 bg-white relative">
            {view === 'home' && (
              <div className={`w-full h-[700px] sm:h-[800px] relative overflow-hidden ${isWorld2Dark ? 'bg-gradient-to-b from-orange-600 to-red-900' : 'bg-gradient-to-b from-sky-400 to-sky-200'}`}>
                <Cloud style={{ top: '10%', left: '10%', transform: 'scale(1.2)' }} delay="0s" isDark={isWorld2Dark} />
                <Cloud style={{ top: '25%', right: '5%', transform: 'scale(0.8)' }} delay="2s" isDark={isWorld2Dark} />
                <Hill style={{ left: '-10%', bottom: '0', transform: 'scale(1.5)', transformOrigin: 'bottom' }} isDark={isWorld2Dark} />
                <Hill style={{ right: '-20%', bottom: '0', transform: 'scale(2)', transformOrigin: 'bottom' }} isDark={isWorld2Dark} />
                
                <div className="absolute top-4 left-4 z-20 bg-slate-800/90 border-2 border-slate-900 px-3 py-1.5 rounded-lg">
                  <span className="font-black text-xs text-white uppercase">{activeWorld === 1 ? "Welt 1: Grundlagen" : "Welt 2: Training"}</span>
                </div>

                <div className="absolute top-4 right-4 z-20 bg-white/90 border-2 border-slate-800 px-3 py-2 rounded-xl flex flex-col gap-1 w-32">
                  <div className="flex justify-between text-xs font-black">
                     <span>Fortschritt</span><span>{progressPercent}%</span>
                  </div>
                  <div className="w-full h-2 bg-slate-200 rounded-full border border-slate-800">
                    <div className={`h-full ${progressPercent === 100 ? 'bg-yellow-400' : 'bg-green-500'}`} style={{ width: `${progressPercent}%` }} />
                  </div>
                </div>

                {activeWorld === 1 && isWorld1Complete && (
                  <button onClick={() => setActiveWorld(2)} className="absolute right-4 top-1/2 -translate-y-1/2 z-30 bg-red-600 text-white font-black px-4 py-3 rounded-xl border-4 border-slate-900 flex flex-col items-center">
                    <Skull className="text-2xl mb-1" /><span className="text-xs">Zu Welt 2</span>
                  </button>
                )}
                {activeWorld === 2 && (
                  <button onClick={() => setActiveWorld(1)} className="absolute left-4 top-1/2 -translate-y-1/2 z-30 bg-sky-500 text-white font-black px-4 py-3 rounded-xl border-4 border-slate-900 flex flex-col items-center">
                    <ArrowLeft className="text-2xl mb-1" /><span className="text-xs">Zu Welt 1</span>
                  </button>
                )}

                <div className="absolute inset-0 z-10 px-8 py-20 pointer-events-none">
                  <div className="relative w-full h-full pointer-events-auto">
                    <svg viewBox="0 0 100 100" className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none">
                      <path d={generatePathD()} stroke={isWorld2Dark ? "#7f1d1d" : "#b45309"} strokeWidth="4" fill="none" strokeDasharray="0 8" />
                    </svg>

                    {currentWorldTopicsData.map((topic) => {
                      const globalIndex = topicsData.findIndex(t => t.id === topic.id);
                      const isComplete = completedTopics.includes(topic.id);
                      const isNext = topic.id === nextAvailableLevelId;
                      const isLocked = isLevelLocked(globalIndex);
                      
                      return (
                        <div key={topic.id} className="absolute -translate-x-1/2 -translate-y-1/2 z-20 group" style={{ left: `${topic.mapPos.x}%`, top: `${topic.mapPos.y}%` }}>
                          <button onClick={() => { if (!isLocked) openTopic(topic.id); }} className={`focus:outline-none transition-all ${isLocked ? 'cursor-not-allowed' : 'cursor-pointer'}`}>
                            {topic.isBoss ? (
                              <div className={`relative w-16 h-16 rounded-xl border-4 flex items-center justify-center ${isComplete ? 'border-yellow-400 bg-yellow-100' : isLocked ? 'border-slate-700 bg-slate-800' : 'border-slate-800 bg-red-600'}`}>
                                {activeWorld === 2 ? <Skull className="text-3xl" /> : <Castle className="text-3xl" />}
                                {isLocked && <Lock className="absolute -top-2 -right-2 text-xl" />}
                                {isComplete && <Star className="absolute -top-4 -right-4 text-2xl" />}
                              </div>
                            ) : (
                              <div className={`relative w-10 h-10 rounded-full border-4 flex items-center justify-center ${isComplete ? 'bg-green-500 border-white' : isNext ? 'bg-yellow-400 border-white animate-bounce' : 'bg-slate-300 border-slate-400'}`}>
                                {isComplete ? <CheckCircle2 className="text-xl" /> : isNext ? <Play className="text-xl" /> : <Lock className="text-sm" />}
                              </div>
                            )}
                          </button>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {view === 'topic' && currentTopic && (
              <div className="w-full bg-white">
                <div className={`p-6 text-white relative border-b-8 ${currentTopic.world === 2 ? 'bg-red-900 border-red-950' : 'bg-slate-800 border-slate-900'}`}>
                  <button onClick={() => setView('home')} className="absolute top-4 right-4 bg-white/20 p-2 rounded-full"><ArrowLeft /></button>
                  <div className="flex items-center gap-4">
                    <div className="bg-white/10 p-3 rounded-xl">{currentTopic.isBoss ? <Castle className="text-3xl" /> : <Map className="text-3xl" />}</div>
                    <div>
                      <span className="uppercase text-slate-400 font-black text-xs">{currentTopic.category}</span>
                      <h2 className="text-2xl font-black">{currentTopic.title}</h2>
                    </div>
                  </div>
                </div>

                <div className="p-6 space-y-10">
                  <div className="prose prose-lg text-slate-700 text-lg">{currentTopic.content}</div>

                  {currentTopic.example && (
                    <div className="bg-sky-50 border-4 border-sky-200 rounded-2xl overflow-hidden">
                      <div className="bg-sky-200 px-5 py-3 flex items-center gap-3">
                        <BookMarked className="text-xl" /><h3 className="text-lg font-black text-sky-900 uppercase">Beispiel-Level</h3>
                      </div>
                      <div className="p-5 space-y-6">
                        <div className="bg-white border-2 border-sky-200 rounded-xl p-3 text-center">
                          <span className="font-mono text-lg font-black text-slate-800">{currentTopic.example.functionText}</span>
                        </div>
                        <div className="grid md:grid-cols-2 gap-6">
                          <div className="text-slate-700 bg-white p-4 rounded-xl border-2">{currentTopic.example.calculation}</div>
                          <div className="bg-white rounded-xl p-2">{currentTopic.example.visual}</div>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="bg-red-50 border-4 border-red-200 p-5 rounded-2xl">
                    <div className="flex items-center gap-3 text-red-800 font-black mb-2">
                      <AlertTriangle className="text-2xl" /><span className="uppercase">Achtung: Boss-Falle!</span>
                    </div>
                    <p className="text-red-900 font-bold">{currentTopic.mistakes}</p>
                  </div>

                  <div className="mt-12 pt-8 border-t-4 border-slate-100">
                    <div className="flex items-center gap-3 mb-6">
                      <div className="bg-yellow-100 border-2 border-yellow-300 p-2 rounded-xl"><Trophy className="text-2xl" /></div>
                      <div>
                        <h3 className="text-2xl font-black text-slate-800 uppercase">Level-Check</h3>
                        <p className="font-bold text-sm text-slate-500">Frage {activeQuizIndex + 1} von {currentTopic.quiz.length}</p>
                      </div>
                      <span className="text-base font-black text-yellow-800 bg-yellow-200 border-2 border-yellow-400 px-3 py-1.5 rounded-xl ml-auto">{topicScore} XP</span>
                    </div>

                    <div className="bg-slate-50 p-6 rounded-3xl border-4 border-slate-200">
                      <p className="font-black text-xl mb-6 text-slate-800">{currentTopic.quiz[activeQuizIndex].question}</p>
                      <div className="space-y-3">
                        {currentTopic.quiz[activeQuizIndex].options.map((opt, optIdx) => {
                          let btnClass = "w-full text-left p-4 rounded-2xl border-4 font-bold text-lg ";
                          if (selectedQuizAnswer === null) btnClass += "bg-white border-slate-200 text-slate-700";
                          else if (optIdx === currentTopic.quiz[activeQuizIndex].answer) btnClass += "bg-green-100 border-green-500 text-green-900";
                          else if (selectedQuizAnswer === optIdx) btnClass += "bg-red-100 border-red-500 text-red-900";
                          else btnClass += "bg-white border-slate-200 text-slate-400 opacity-50";

                          return (
                            <button key={optIdx} disabled={selectedQuizAnswer !== null} onClick={() => handleQuizAnswer(currentTopic.id, optIdx, currentTopic.quiz[activeQuizIndex].answer)} className={btnClass}>
                              {opt}
                            </button>
                          );
                        })}
                      </div>

                      {quizResult && (
                        <div className={`mt-6 p-5 rounded-2xl flex gap-4 border-4 ${quizResult === 'correct' ? 'bg-green-50 border-green-400 text-green-900' : 'bg-red-50 border-red-400 text-red-900'}`}>
                          {quizResult === 'correct' ? <CheckCircle2 className="text-2xl mt-1" /> : <AlertTriangle className="text-2xl mt-1" />}
                          <div className="flex-grow">
                            <p className="font-black text-xl uppercase">{quizResult === 'correct' ? '+20 XP Geknackt!' : 'Leben verloren!'}</p>
                            <p className="font-medium">{currentTopic.quiz[activeQuizIndex].explanation}</p>
                          </div>
                          <div>
                            {quizResult === 'wrong' ? (
                              <button onClick={() => { setSelectedQuizAnswer(null); setQuizResult(null); }} className="font-black bg-white text-red-600 px-5 py-2 rounded-xl border-4 border-red-200 uppercase">Retry!</button>
                            ) : (
                              <button onClick={nextQuestion} className="font-black bg-green-500 text-white px-5 py-2 rounded-xl border-b-4 border-green-700 uppercase flex items-center">
                                {activeQuizIndex < currentTopic.quiz.length - 1 ? 'Next' : 'Finish'} <ChevronRight className="ml-1" />
                              </button>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    // App in das root-div rendern
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
