<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 2. React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 3. Babel (übersetzt den React-Code für den Browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-800 antialiased min-h-screen">
  
  <!-- Hier lädt die App hinein -->
  <div id="root"></div>

  <!-- UNSER REACT CODE -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // 1. ICONS (Direkt als SVG eingebaut)
    // ==========================================
    const Icon = ({ children, className = "", ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );
    const Trophy = (p) => <Icon {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7c0 3.31 2.69 6 6 6s6-2.69 6-6V2Z"/></Icon>;
    const Star = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
    const AlertTriangle = (p) => <Icon {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></Icon>;
    const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
    const ArrowLeft = (p) => <Icon {...p}><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></Icon>;
    const BookMarked = (p) => <Icon {...p}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/><path d="M7 7h10"/><path d="M7 11h10"/></Icon>;
    const MapIcon = (p) => <Icon {...p}><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></Icon>;
    const Castle = (p) => <Icon {...p}><path d="M22 20v-9H2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2Z"/><path d="M18 11V4H6v7"/><path d="M15 22v-4a3 3 0 0 0-3-3v0a3 3 0 0 0-3 3v4"/><path d="M22 11V9"/><path d="M2 11V9"/><path d="M6 4V2"/><path d="M18 4V2"/><path d="M10 4V2"/><path d="M14 4V2"/></Icon>;
    const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"/></Icon>;
    const Lock = (p) => <Icon {...p}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></Icon>;
    const Skull = (p) => <Icon {...p}><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M8 20v2h8v-2"/><path d="m12.5 17-.5-1-.5 1h1z"/><path d="M16 20a2 2 0 0 0 1.56-3.25 8 8 0 1 0-11.12 0A2 2 0 0 0 8 20"/></Icon>;

    // ==========================================
    // 2. UI KOMPONENTEN
    // ==========================================
    const Fraction = ({ num, den }) => (
      <span className="inline-flex flex-col items-center justify-center align-middle mx-1 text-base font-bold">
        <span className="border-b-2 border-current px-1 pb-0.5 w-full text-center leading-none">{num}</span>
        <span className="px-1 pt-0.5 w-full text-center leading-none">{den}</span>
      </span>
    );

    const mapX = (x, xD, w) => ((x - xD[0]) / (xD[1] - xD[0])) * w;
    const mapY = (y, yD, h) => h - ((y - yD[0]) / (yD[1] - yD[0])) * h;

    const MathGraph = ({ xD=[-5,5], yD=[-5,5], width=400, height=250, children }) => {
      const originX = mapX(0, xD, width);
      const originY = mapY(0, yD, height);

      return (
        <div className="w-full overflow-hidden bg-white rounded-xl shadow-inner border-2 border-slate-200 p-2">
          <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto font-sans">
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8" />
              </marker>
            </defs>
            {Array.from({length: xD[1]-xD[0]+1}, (_, i) => xD[0]+i).map(x => (
              <line key={`gx-${x}`} x1={mapX(x, xD, width)} y1={0} x2={mapX(x, xD, width)} y2={height} stroke="#f1f5f9" strokeWidth="1" />
            ))}
            {Array.from({length: yD[1]-yD[0]+1}, (_, i) => yD[0]+i).map(y => (
              <line key={`gy-${y}`} x1={0} y1={mapY(y, yD, height)} x2={width} y2={mapY(y, yD, height)} stroke="#f1f5f9" strokeWidth="1" />
            ))}
            <line x1={0} y1={originY} x2={width} y2={originY} stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)" />
            <line x1={originX} y1={height} x2={originX} y2={0} stroke="#64748b" strokeWidth="1.5" markerEnd="url(#arrow)" />
            <text x={width - 15} y={originY - 8} fontSize="12" fill="#64748b" fontWeight="bold">x</text>
            <text x={originX + 8} y={15} fontSize="12" fill="#64748b" fontWeight="bold">y</text>
            {children}
          </svg>
        </div>
      );
    };

    const PlotPath = ({ fn, xD, yD, w=400, h=250, color="#3b82f6", strokeWidth=2.5, dashed=false }) => {
      let d = "";
      const steps = 150;
      for(let i=0; i<=steps; i++) {
        const x = xD[0] + (i/steps) * (xD[1] - xD[0]);
        const y = fn(x);
        const clampedY = Math.max(yD[0]-10, Math.min(yD[1]+10, y)); 
        const px = mapX(x, xD, w);
        const py = mapY(clampedY, yD, h);
        d += (i === 0 ? "M " : "L ") + `${px} ${py} `;
      }
      return <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeDasharray={dashed ? "6 4" : "none"} />;
    };

    const PlotPoint = ({ x, y, xD, yD, w=400, h=250, color="#ef4444", label, labelOffset={x:0, y:-10} }) => (
      <g>
        <circle cx={mapX(x, xD, w)} cy={mapY(y, yD, h)} r={5} fill={color} stroke="#fff" strokeWidth="1.5" />
        {label && <text x={mapX(x, xD, w) + labelOffset.x} y={mapY(y, yD, h) + labelOffset.y} fontSize="12" fill={color} fontWeight="bold" textAnchor="middle">{label}</text>}
      </g>
    );

    const PlotLine = ({ x1, y1, x2, y2, xD, yD, w=400, h=250, color="#ef4444", strokeWidth=2, dashed=false }) => (
      <line x1={mapX(x1, xD, w)} y1={mapY(y1, yD, h)} x2={mapX(x2, xD, w)} y2={mapY(y2, yD, h)} stroke={color} strokeWidth={strokeWidth} strokeDasharray={dashed ? "5 5" : "none"} />
    );

    const PlotArea = ({ xStart, xEnd, xD, yD, w=400, h=250, color }) => (
      <rect x={mapX(xStart, xD, w)} y={0} width={mapX(xEnd, xD, w) - mapX(xStart, xD, w)} height={h} fill={color} opacity="0.15" />
    );

    const Cloud = ({ style, delay, isDark }) => (
      <div className={`absolute opacity-80 pointer-events-none animate-pulse`} style={{ ...style, animationDuration: '4s', animationDelay: delay }}>
        <svg width="100" height="40" viewBox="0 0 100 40" fill={isDark ? "#475569" : "white"}>
          <path d="M 20 40 Q 5 40 5 25 Q 5 10 20 15 Q 30 -5 55 5 Q 75 -5 85 15 Q 100 10 95 25 Q 95 40 80 40 Z" />
        </svg>
      </div>
    );

    const Hill = ({ style, isDark }) => (
      <div className="absolute bottom-0 opacity-100 pointer-events-none" style={style}>
        <svg width="200" height="100" viewBox="0 0 200 100" fill="none">
          <path d="M 0 100 Q 100 -50 200 100 Z" fill={isDark ? "#1e1b4b" : "#22c55e"} />
          <path d="M 0 100 Q 100 -50 200 100 Z" stroke={isDark ? "#312e81" : "#16a34a"} strokeWidth="8" />
        </svg>
      </div>
    );

    // ==========================================
    // 3. LERN-INHALTE
    // ==========================================
    const topicsData = [
      {
        id: "mittlere-aenderung",
        world: 1,
        category: "Welt 1",
        title: "1-1: Mittlere Änderungsrate",
        shortDesc: "Differenzenquotient & Sekante",
        mapPos: { x: 15, y: 88 },
        content: (
          <div className="space-y-4 text-gray-700">
            <p>Die <strong>mittlere Änderungsrate</strong> gibt an, wie stark sich ein Graph in einem bestimmten Abschnitt (Intervall) <em>durchschnittlich</em> ändert. Stell dir vor, du verbindest Start- und Endpunkt dieses Abschnitts mit einer geraden Linie (der sogenannten <strong>Sekante</strong>).</p>
            <p>Die Steigung dieser Sekante berechnen wir mit dem <strong>Differenzenquotient</strong> (das ist im Prinzip nur das Steigungsdreieck <span className="inline-flex items-center align-middle">m = <Fraction num="Δy" den="Δx" /></span>):</p>
            <div className="bg-sky-50 p-4 rounded-lg border border-sky-200 flex items-center justify-center font-mono text-lg font-bold text-sky-900 shadow-sm">
              m = <Fraction num="f(x₂) - f(x₁)" den="x₂ - x₁" />
            </div>
          </div>
        ),
        example: {
          functionText: "f(x) = 0.5x² im Intervall [1; 3]",
          calculation: (
            <ul className="space-y-2 list-disc pl-5">
              <li><strong>Schritt 1 (y-Werte berechnen):</strong> <br/>f(1) = 0.5 · 1² = 0.5 <br/> f(3) = 0.5 · 3² = 4.5</li>
              <li><strong>Schritt 2 (Einsetzen):</strong> <br/><span className="inline-flex items-center align-middle mt-1">m = <Fraction num="4.5 - 0.5" den="3 - 1" /></span></li>
              <li><strong>Ergebnis:</strong> <span className="inline-flex items-center align-middle">m = <Fraction num="4" den="2" /> = <strong>2</strong></span></li>
            </ul>
          ),
          visual: (
            <MathGraph xD={[0, 4]} yD={[-1, 6]}>
              <PlotPath fn={x => 0.5 * x * x} xD={[0, 4]} yD={[-1, 6]} color="#3b82f6" />
              <PlotPath fn={x => 2 * x - 1.5} xD={[0, 4]} yD={[-1, 6]} color="#ef4444" dashed />
              <PlotLine x1={1} y1={0.5} x2={3} y2={0.5} xD={[0,4]} yD={[-1,6]} color="#10b981" />
              <PlotLine x1={3} y1={0.5} x2={3} y2={4.5} xD={[0,4]} yD={[-1,6]} color="#10b981" />
              <PlotPoint x={1} y={0.5} xD={[0, 4]} yD={[-1, 6]} color="#ef4444" label="P₁" />
              <PlotPoint x={3} y={4.5} xD={[0, 4]} yD={[-1, 6]} color="#ef4444" label="P₂" />
            </MathGraph>
          )
        },
        mistakes: "Oft werden beim Einsetzen in die Formel x und y vertauscht. Achte genau darauf: Oben im Bruch (Zähler) stehen die y-Werte (die f(x)-Werte), unten im Nenner die x-Werte!",
        quiz: [
          { question: "1. Welche geometrische Linie gehört zur mittleren Änderungsrate?", options: ["Tangente", "Sekante", "Normale"], answer: 1, explanation: "Richtig! Die Sekante schneidet den Graphen in den zwei Punkten des Intervalls." },
          { question: <span>2. Wie lautet die Formel für den Differenzenquotient?</span>, options: [<span><Fraction num="x₂ - x₁" den="f(x₂) - f(x₁)" /></span>, <span><Fraction num="f(x₂) - f(x₁)" den="x₂ - x₁" /></span>, "f'(x)"], answer: 1, explanation: "Die y-Werte (Höhenunterschied) müssen oben in den Zähler!" },
          { question: "3. Berechne die mittlere Änderungsrate von f(x) = 2x im Intervall [1; 4].", options: ["2", "4", "6"], answer: 0, explanation: <span>Richtig! f(4)=8, f(1)=2. Eingesetzt: <span className="inline-flex items-center">m = <Fraction num="8 - 2" den="4 - 1" /> = <Fraction num="6" den="3" /> = 2</span>. Da f(x) eine Gerade ist, ist die Steigung überall 2!</span> },
          { question: "4. Berechne die mittlere Änderungsrate von f(x) = x² im Intervall [0; 3].", options: ["3", "6", "9"], answer: 0, explanation: <span>Klasse! f(3)=9, f(0)=0. Eingesetzt: <span className="inline-flex items-center">m = <Fraction num="9 - 0" den="3 - 0" /> = <Fraction num="9" den="3" /> = 3</span>.</span> },
          { question: "5. Warum können wir die momentane Änderung (in nur einem Punkt) nicht einfach mit dem Differenzenquotient berechnen?", options: ["Weil das Intervall dann [a; a] wäre und wir durch 0 teilen würden", "Weil die Formel dann negativ wird", "Weil y dann 0 ist"], answer: 0, explanation: "Exakt! Durch 0 darf man nicht teilen. Deshalb brauchen wir die Ableitung!" }
        ]
      },
      {
        id: "momentane-aenderung",
        world: 1,
        category: "Welt 1",
        title: "1-2: Momentane Änderung",
        shortDesc: "Ableitung & Tangentensteigung",
        mapPos: { x: 45, y: 75 },
        content: (
          <div className="space-y-4 text-gray-700">
            <p>Die <strong>momentane Änderungsrate</strong> beschreibt die Steigung des Graphen in einem <em>einzigen, exakten Punkt</em>. </p>
            <p>Geometrisch entspricht das der Steigung einer <strong>Tangente</strong>, die den Graphen in genau diesem Punkt berührt. Wir berechnen diese Steigung mit der <strong>1. Ableitung f'(x)</strong> an der gesuchten Stelle x₀.</p>
            <div className="bg-amber-50 p-3 rounded-lg border-l-4 border-amber-500 font-bold text-amber-900 shadow-sm">
              f'(x₀) = Steigung der Tangente im Punkt (x₀ | f(x₀))
            </div>
          </div>
        ),
        example: {
          functionText: "f(x) = -x² + 4x an der Stelle x₀ = 1",
          calculation: (
            <ul className="space-y-2 list-disc pl-5">
              <li><strong>Schritt 1 (Ableitung bilden):</strong> <br/>f'(x) = -2x + 4</li>
              <li><strong>Schritt 2 (x₀ einsetzen):</strong> <br/>f'(1) = -2 · 1 + 4 = <strong>2</strong></li>
              <li>Die Steigung der gelben Tangente im Berührpunkt ist 2.</li>
            </ul>
          ),
          visual: (
            <MathGraph xD={[-1, 4]} yD={[-1, 5]}>
              <PlotPath fn={x => -x*x + 4*x} xD={[-1, 4]} yD={[-1, 5]} color="#3b82f6" />
              <PlotPath fn={x => 2*x + 1} xD={[-1, 4]} yD={[-1, 5]} color="#eab308" strokeWidth={3} />
              <PlotPoint x={1} y={3} xD={[-1, 4]} yD={[-1, 5]} color="#eab308" label="P(1|3)" />
            </MathGraph>
          )
        },
        mistakes: "Viele Schüler denken, f'(x₀) gibt den y-Wert an. Falsch! f(x₀) ist die 'Höhe', f'(x₀) ist die 'Steilheit' (Steigung) des Graphen an dieser Stelle.",
        quiz: [
          { question: "1. Was berechnet die erste Ableitung f'(x₀) geometrisch?", options: ["Die Steigung der Sekante", "Die Steigung der Tangente", "Den y-Achsenabschnitt"], answer: 1, explanation: "Perfekt! f'(x) gibt immer die Tangentensteigung im Berührpunkt an." },
          { question: "2. Aus welcher mathematischen Idee entsteht die momentane Änderungsrate?", options: ["Dem Grenzwert (Limes), bei dem das Intervall unendlich klein wird", "Dem Satz des Pythagoras", "Der Mitternachtsformel"], answer: 0, explanation: "Richtig! Wir lassen im Differenzenquotient den Abstand gegen 0 laufen (Intervall wird unendlich klein)." },
          { question: "3. f(x) = x². Wie groß ist die momentane Änderungsrate an der Stelle x = 3?", options: ["6", "9", "3"], answer: 0, explanation: "Ableitung bilden: f'(x) = 2x. Dann 3 einsetzen: f'(3) = 2*3 = 6." },
          { question: "4. f(x) = 5x + 2. Wie groß ist die momentane Änderungsrate an der Stelle x = 100?", options: ["502", "5", "100"], answer: 1, explanation: "Da f(x) eine Gerade ist, ist ihre Steigung überall gleich! f'(x) = 5." },
          { question: "5. Eine Funktion f(x) hat an der Stelle x=2 einen Hochpunkt. Wie groß ist dort die momentane Änderungsrate f'(2)?", options: ["0", "Sehr groß", "Negativ"], answer: 0, explanation: "Genial! Am Hochpunkt ist die Tangente waagerecht, also ist die Steigung (momentane Änderung) exakt 0." }
        ]
      },
      {
        id: "graphisches-ableiten",
        world: 1,
        category: "Welt 1",
        title: "1-3: Graphisches Ableiten",
        shortDesc: "Die magische NEW-Regel",
        mapPos: { x: 80, y: 60 },
        content: (
          <div className="space-y-4 text-gray-700">
            <p>Beim graphischen Ableiten zeichnet man den Graphen der Ableitung f'(x) direkt unter den Graphen von f(x). Hierbei hilft die <strong>NEW-Regel</strong> ("Aus <strong>N</strong> wird nichts, aus <strong>E</strong> wird <strong>N</strong>, aus <strong>W</strong> wird <strong>E</strong>"):</p>
            <ul className="list-disc pl-5">
              <li>Extrempunkt (E) bei f(x) ➔ Nullstelle (N) bei f'(x)</li>
              <li>Wendepunkt (W) bei f(x) ➔ Extrempunkt (E) bei f'(x)</li>
              <li>Graph f(x) steigt ➔ f'(x) verläuft im positiven y-Bereich</li>
              <li>Graph f(x) fällt ➔ f'(x) verläuft im negativen y-Bereich</li>
            </ul>
          </div>
        ),
        example: {
          functionText: "Blau = f(x) // Rot = f'(x)",
          calculation: (
            <ul className="space-y-2 list-disc pl-5">
              <li>Blau hat einen Hochpunkt (E) bei x=-1 ➔ Rot hat dort eine Nullstelle (N).</li>
              <li>Blau hat einen Tiefpunkt (E) bei x=1 ➔ Rot hat dort eine Nullstelle (N).</li>
              <li>Dazwischen fällt Blau (Steigung negativ) ➔ Rot ist unterhalb der x-Achse.</li>
            </ul>
          ),
          visual: (
            <MathGraph xD={[-3, 3]} yD={[-4, 4]}>
              <PlotPath fn={x => Math.pow(x,3) - 3*x} xD={[-3, 3]} yD={[-4, 4]} color="#3b82f6" />
              <PlotPath fn={x => 3*x*x - 3} xD={[-3, 3]} yD={[-4, 4]} color="#ef4444" strokeWidth={2.5} />
              <PlotLine x1={-1} y1={2} x2={-1} y2={0} xD={[-3,3]} yD={[-4,4]} color="#94a3b8" dashed />
              <PlotLine x1={1} y1={-2} x2={1} y2={0} xD={[-3,3]} yD={[-4,4]} color="#94a3b8" dashed />
              <PlotPoint x={-1} y={2} xD={[-3, 3]} yD={[-4, 4]} color="#3b82f6" label="HP (E)" />
              <PlotPoint x={-1} y={0} xD={[-3, 3]} yD={[-4, 4]} color="#ef4444" label="N" labelOffset={{x:0, y:15}} />
            </MathGraph>
          )
        },
        mistakes: "Schüler zeichnen f'(x) hoch, wenn f(x) weit oben im Koordinatensystem liegt (hohe y-Werte). Es geht aber NUR um die Steigung!",
        quiz: [
          { question: "1. Wofür steht das 'E' in der NEW-Regel?", options: ["Extremstelle", "Ersatzpunkt", "Eulersche Zahl"], answer: 0, explanation: "Richtig! Hoch- und Tiefpunkte (Extremstellen)." },
          { question: "2. f(x) hat bei x=4 einen Tiefpunkt. Was gilt für f'(x)?", options: ["f'(4) hat einen Tiefpunkt", "f'(4) = 0 (Nullstelle)", "f'(4) ist positiv"], answer: 1, explanation: "Aus E wird N: Ein Extrempunkt bei f(x) führt zu einer Nullstelle bei f'(x)." },
          { question: "3. Der Graph von f(x) fällt im Intervall von 0 bis 5. Wo verläuft f'(x) in diesem Bereich?", options: ["Oberhalb der x-Achse (positiv)", "Unterhalb der x-Achse (negativ)", "Genau auf der x-Achse"], answer: 1, explanation: "Fallen bedeutet negative Steigung. Also sind die y-Werte von f'(x) im Minus-Bereich." },
          { question: "4. f(x) ist eine gerade Linie, die steigt (z.B. y = 2x). Wie sieht der Graph der Ableitung f'(x) aus?", options: ["Eine waagerechte Linie oberhalb der x-Achse", "Eine Parabel", "Eine Nullstelle"], answer: 0, explanation: "Die Steigung ist überall konstant positiv. Also ist f'(x) eine waagerechte Linie bei y=2." },
          { question: "5. Wir wissen: f'(x) ist eine nach oben geöffnete Parabel. Welchen Grad muss f(x) dann mindestens haben?", options: ["Grad 2", "Grad 3", "Grad 4"], answer: 1, explanation: "f'(x) hat Grad 2 (Parabel). Beim Ableiten wird der Grad immer um 1 kleiner. Also muss f(x) vorher Grad 3 (z.B. x³) gewesen sein!" }
        ]
      },
      {
        id: "ableitungsregeln",
        world: 1,
        category: "Welt 1",
        title: "1-4: Ableitungsregeln",
        shortDesc: "Potenz- & Faktorregel",
        mapPos: { x: 50, y: 40 },
        content: (

    function App() {
      const [view, setView] = useState('home'); 
      const [currentTopicId, setCurrentTopicId] = useState(null);
      
      const [xp, setXp] = useState(0);
      const [completedTopics, setCompletedTopics] = useState([]);
      const [showLevelUp, setShowLevelUp] = useState(false);
      const [errorCount, setErrorCount] = useState(0);
      
      const [activeQuizIndex, setActiveQuizIndex] = useState(0);
      const [selectedQuizAnswer, setSelectedQuizAnswer] = useState(null);

      const world1Topics = topicsData.filter(t => t.world === 1);

      const completedQuizzesCount = completedTopics.filter(id => !id.includes("_read")).length;
      const progressPercent = Math.round((completedQuizzesCount / totalTopics) * 100);
      
      const currentLevel = Math.floor(xp / 150) + 1;
      const xpForNextLevel = currentLevel * 150;

      useEffect(() => {
        if (xp > 0 && xp % 150 === 0 || (xp > 150 && Math.floor(xp/150) > Math.floor((xp-20)/150))) {
          setShowLevelUp(true);
          setTimeout(() => setShowLevelUp(false), 3000);
        }
      }, [xp]);

      const openTopic = (id) => {
        setCurrentTopicId(id);
        setActiveQuizIndex(0);
        setSelectedQuizAnswer(null);
        setQuizResult(null);
        setTopicScore(0);
        setView('topic');
        window.scrollTo(0, 0);
      };

      const handleQuizAnswer = (topicId, answerIndex, correctAnswerIndex) => {
        setSelectedQuizAnswer(answerIndex);
        if (answerIndex === correctAnswerIndex) {
          setQuizResult('correct');
          setTopicScore(s => s + 20); 
          setXp(x => x + 20); 
        } else {
          setQuizResult('wrong');
          setErrorCount(e => e + 1);
        }
      };

      const nextQuestion = () => {
        if (activeQuizIndex < topicsData.find(t=>t.id===currentTopicId).quiz.length - 1) {
          setActiveQuizIndex(a => a + 1);
          setSelectedQuizAnswer(null);
          setQuizResult(null);
        } else {
          if (!completedTopics.includes(currentTopicId)) {
            setCompletedTopics([...completedTopics, currentTopicId]);
          }
          setView('home');
          window.scrollTo(0, 0);
        }
      };

      useEffect(() => {
        if (view === 'topic' && currentTopicId) {
           if (!completedTopics.includes(currentTopicId + "_read")) {
              setCompletedTopics([...completedTopics, currentTopicId + "_read"]);
              setXp(xp => xp + 50); 
           }
        }
      }, [view, currentTopicId]);

      const currentTopic = topicsData.find(t => t.id === currentTopicId);
      const currentWorldTopicsData = topicsData.filter(t => t.world === activeWorld);

      const generatePathD = () => {
        let d = "";
        currentWorldTopicsData.forEach((t, i) => {
          if(i === 0) d += `M ${t.mapPos.x} ${t.mapPos.y} `;
          else d += `L ${t.mapPos.x} ${t.mapPos.y} `;
        });
        return d;
      };

      const nextLevelObj = topicsData.find(t => !completedTopics.includes(t.id));
      const nextAvailableLevelId = nextLevelObj ? nextLevelObj.id : null;

      const isLevelLocked = (topicIndexInGlobalArray) => {
        if (topicIndexInGlobalArray === 0) return false; 
        const previousTopicId = topicsData[topicIndexInGlobalArray - 1].id;
        return !completedTopics.includes(previousTopicId);
      };

      const isWorld2Dark = activeWorld === 2;

      return (
        <div className="min-h-screen font-sans text-slate-800 bg-slate-900 pb-10">
          
          <header className="bg-white sticky top-0 z-50 border-b-4 border-slate-300 shadow-md">
            <div className="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center space-x-3 cursor-pointer group" onClick={() => setView('home')}>

                <div className="w-24 sm:w-32 h-5 bg-slate-800 rounded-full overflow-hidden border-2 border-slate-900 relative">

                <Hill style={{ left: '20%', bottom: '0', transform: 'scale(1.2)', transformOrigin: 'bottom' }} isDark={isWorld2Dark} />
                <div className={`absolute bottom-0 w-full h-16 border-t-8 z-0 transition-colors duration-1000 ${isWorld2Dark ? 'bg-slate-900 border-slate-950' : 'bg-green-500 border-green-600'}`}></div>
                
                <div className="absolute top-4 left-4 z-20 bg-slate-800/90 backdrop-blur border-2 border-slate-900 px-3 py-1.5 rounded-lg shadow-md">

                    <span className="text-xs uppercase">Zu Welt 1</span>

                                relative w-16 h-16 sm:w-20 sm:h-20 rounded-xl border-4 shadow-xl flex items-center justify-center transition-all z-20
                                ${isComplete ? 'border-yellow-400 bg-yellow-100' : isLocked ? 'border-slate-700 bg-slate-800 opacity-90' : 'border-slate-800 bg-red-600'}
                                ${isNext ? 'animate-bounce border-yellow-400 bg-red-500 scale-110' : (!isLocked && 'hover:-translate-y-2')}
                              `} style={{ boxShadow: isComplete ? '0 6px 0 #ca8a04' : isLocked ? '0 6px 0 #334155' : '0 6px 0 #7f1d1d' }}>
                                {activeWorld === 2 ? (
                                   <Skull className={`w-8 h-8 sm:w-10 sm:h-10 ${isComplete ? 'text-yellow-500' : isLocked ? 'text-slate-500' : 'text-white'}`} />
                                ) : (
                                   <Castle className={`w-8 h-8 sm:w-10 sm:h-10 ${isComplete ? 'text-yellow-500' : isLocked ? 'text-slate-500' : 'text-white'}`} />
                                )}
                                
                                {isLocked && <Lock className="absolute -top-2 -right-2 w-6 h-6 text-slate-400" />}
                                {isComplete && <Star className="absolute -top-4 -right-4 w-8 h-8 text-yellow-400 fill-yellow-400 drop-shadow-md" />}
                              </div>
                            ) : (
                              <div className={`
                                relative w-10 h-10 sm:w-12 sm:h-12 rounded-full border-4 flex items-center justify-center transition-all z-20
                                ${isComplete ? 'bg-green-500 border-white' : isNext ? 'bg-yellow-400 border-white animate-bounce' : 'bg-slate-300 border-slate-400 opacity-90'}
                                ${(!isNext && !isLocked) ? 'hover:-translate-y-1 hover:scale-105' : ''}
                              `} style={{ boxShadow: isComplete ? '0 4px 0 #15803d' : isNext ? '0 4px 0 #ca8a04, 0 0 15px #fef08a' : '0 4px 0 #94a3b8' }}>
                                {isComplete ? (
                                   <CheckCircle2 className="w-5 h-5 sm:w-6 sm:h-6 text-white" />
                                ) : isNext ? (
                                   <Play className="w-4 h-4 sm:w-5 sm:h-5 text-slate-800 fill-slate-800 ml-1" />
                                ) : (
                                   <Lock className="w-4 h-4 sm:w-4 sm:h-4 text-slate-500" />
                                )}
                              </div>
                            )}
                          </button>

                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

            {view === 'topic' && currentTopic && (
              <div className="w-full bg-white animate-in slide-in-from-right-8 duration-300">
                <div className={`p-6 sm:p-8 text-white relative overflow-hidden border-b-8 ${currentTopic.world === 2 ? 'bg-red-900 border-red-950' : 'bg-slate-800 border-slate-900'}`}>
                  <button 
                    onClick={() => setView('home')}
                    className="absolute top-4 right-4 bg-white/20 hover:bg-white/40 p-2 rounded-full transition-colors"
                  >
                    <ArrowLeft className="w-6 h-6 text-white" />
                  </button>
                  
                  <div className="relative z-10 flex items-center gap-4">
                    <div className="bg-white/10 p-3 rounded-xl shrink-0">
                      {currentTopic.isBoss ? <Castle className="w-8 h-8 text-yellow-400" /> : <MapIcon className="w-8 h-8 text-sky-400" />}
                    </div>
                    <div>
                      <span className="uppercase text-slate-400 font-black text-xs tracking-widest block mb-1">{currentTopic.category}</span>
                      <h2 className="text-2xl sm:text-3xl font-black leading-tight">{currentTopic.title}</h2>
                    </div>
                  </div>
                </div>

                <div className="p-6 sm:p-8 space-y-10">
                  
                  <div className="prose prose-lg max-w-none text-slate-700 leading-relaxed text-lg">
                    {currentTopic.content}
                  </div>

                  {currentTopic.example && (
                    <div className="bg-sky-50 border-4 border-sky-200 rounded-2xl overflow-hidden shadow-sm">
                      <div className="bg-sky-200 px-5 py-3 flex items-center gap-3">
                        <BookMarked className="w-5 h-5 text-sky-800" />
                        <h3 className="text-lg font-black text-sky-900 uppercase tracking-wide">Beispiel-Level</h3>
                      </div>
                      
                      <div className="p-5 space-y-6">
                        <div className="bg-white border-2 border-sky-200 rounded-xl p-3 text-center shadow-sm">
                          <span className="font-mono text-lg font-black text-slate-800">
                            {currentTopic.example.functionText}
                          </span>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6 items-start">
                          <div className="text-slate-700 bg-white p-4 rounded-xl border-2 border-slate-100 shadow-sm h-full font-medium">
                            <h4 className="font-black text-xs uppercase tracking-wider text-slate-400 mb-3 border-b-2 pb-2">Der Lösungsweg</h4>
                            {currentTopic.example.calculation}
                          </div>
                          <div className="flex flex-col h-full">
                             <h4 className="font-black text-xs uppercase tracking-wider text-slate-400 mb-3 border-b-2 pb-2 px-2">Der Funktionsgraph</h4>
                             <div className="flex-grow flex items-center bg-white rounded-xl">
                               {currentTopic.example.visual}
                             </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  <div className="bg-red-50 border-4 border-red-200 p-5 rounded-2xl relative overflow-hidden">
                    <div className="flex items-center gap-3 text-red-800 font-black mb-2">
                      <AlertTriangle className="w-6 h-6" />
                      <span className="text-lg uppercase tracking-wider">Achtung: Boss-Falle!</span>
                    </div>
                    <p className="text-red-900/80 font-bold text-base">
                      {currentTopic.mistakes}
                    </p>
                  </div>

                  <div className="mt-12 pt-8 border-t-4 border-slate-100">
                    <div className="flex items-center gap-3 mb-6">
                      <div className="bg-yellow-100 border-2 border-yellow-300 p-2 rounded-xl">
                        <Trophy className="w-6 h-6 text-yellow-600" />
                      </div>
                      <div>
                        <h3 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Level-Check</h3>
                        <p className="font-bold text-sm text-slate-500">Frage {activeQuizIndex + 1} von 5</p>
                      </div>
                      <span className="text-base font-black text-yellow-800 bg-yellow-200 border-2 border-yellow-400 px-3 py-1.5 rounded-xl ml-auto shadow-sm transform -rotate-2">
                        {topicScore} XP
                      </span>
                    </div>

                    <div className="bg-slate-50 p-5 sm:p-6 rounded-3xl border-4 border-slate-200 shadow-inner">
                      <p className="font-black text-xl mb-6 text-slate-800 leading-tight flex flex-wrap items-center">
                        {currentTopic.quiz[activeQuizIndex].question}
                      </p>
                      
                      <div className="space-y-3">
                        {currentTopic.quiz[activeQuizIndex].options.map((opt, optIdx) => {
                          let btnClass = "w-full text-left p-4 rounded-2xl border-4 transition-all font-bold text-lg flex items-center gap-2 ";
                          
                          if (selectedQuizAnswer === null) {
                            btnClass += "bg-white border-slate-200 hover:border-sky-400 hover:bg-sky-50 text-slate-700 hover:-translate-y-1 shadow-[0_4px_0_#e2e8f0] hover:shadow-[0_6px_0_#38bdf8] active:translate-y-1 active:shadow-none";
                          } else if (optIdx === currentTopic.quiz[activeQuizIndex].answer) {
                            btnClass += "bg-green-100 border-green-500 text-green-900 shadow-none translate-y-1";
                          } else if (selectedQuizAnswer === optIdx) {
                            btnClass += "bg-red-100 border-red-500 text-red-900 opacity-80 shadow-none translate-y-1";
                          } else {
                            btnClass += "bg-white border-slate-200 text-slate-400 opacity-50 shadow-none";
                          }

                          return (
                            <button 
                              key={optIdx}
                              disabled={selectedQuizAnswer !== null}
                              onClick={() => handleQuizAnswer(currentTopic.id, optIdx, currentTopic.quiz[activeQuizIndex].answer)}
                              className={btnClass}
                            >
                              {opt}
                            </button>
                          );
                        })}
                      </div>

                      {quizResult && (
                        <div className={`mt-6 p-5 rounded-2xl flex flex-col sm:flex-row items-center sm:items-start gap-4 shadow-lg border-4 animate-in fade-in zoom-in duration-300 ${quizResult === 'correct' ? 'bg-green-50 border-green-400 text-green-900' : 'bg-red-50 border-red-400 text-red-900'}`}>
                          {quizResult === 'correct' ? (
                            <div className="bg-green-500 rounded-full p-2 shrink-0 border-2 border-green-700">
                               <CheckCircle2 className="w-6 h-6 text-white" />
                            </div>
                          ) : (
                            <div className="bg-red-500 rounded-full p-2 shrink-0 border-2 border-red-700">
                               <AlertTriangle className="w-6 h-6 text-white" />
                            </div>
                          )}
                          <div className="text-center sm:text-left flex-grow">
                            <p className="font-black text-xl mb-1 uppercase tracking-wide">
                              {quizResult === 'correct' ? '+20 XP Geknackt!' : 'Leben verloren!'}
                            </p>
                            <p className="text-base font-medium opacity-90 flex flex-wrap items-center gap-1">{currentTopic.quiz[activeQuizIndex].explanation}</p>
                          </div>
                          
                          <div className="shrink-0 mt-3 sm:mt-0">
                            {quizResult === 'wrong' ? (
                              <button 
                                onClick={() => { setSelectedQuizAnswer(null); setQuizResult(null); }}
                                className="font-black bg-white text-red-600 px-5 py-2 rounded-xl border-4 border-red-200 hover:bg-red-100 active:translate-y-1 transition-all uppercase tracking-wider"
                              >
                                Retry!
                              </button>
                            ) : (
                              <button 
                                onClick={nextQuestion}
                                className="font-black bg-green-500 text-white px-5 py-2 rounded-xl border-b-4 border-green-700 hover:bg-green-400 hover:border-green-600 active:border-b-0 active:translate-y-1 transition-all uppercase tracking-wider flex items-center"
                              >
                                {activeQuizIndex < 4 ? 'Next' : 'Finish'} <ChevronRight className="w-5 h-5 ml-1" />
                              </button>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
